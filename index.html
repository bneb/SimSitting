    <script>
        const POST_LINES = [
            { text: "SIMSITTING(TM) SYSTEMS BIOS V4.06.47", cls: "header", delay: 80 },
            { text: "COPYRIGHT (C) 1996-2026 BROADCAST_OS CORP.", cls: "header", delay: 60 },
            { text: "ALL RIGHTS RESERVED.", cls: "dim", delay: 300 },
            { text: "", delay: 200 },
            { text: "CPU: COGNITIVE_GRAVITY(TM) PROCESSOR @ 72 BPM", delay: 100 },
            { text: "CHECKING NVRAM... 102400KB OK", delay: 150 },
            { text: "SEARCHING FOR SUBJECTIVITY... NOT FOUND.", cls: "warn", delay: 400 },
            { text: "INITIALIZING ATTENTION_ZONING_ENGINE... [ OK ]", delay: 120 },
            { text: "", delay: 150 },
            { text: "DETECTING PERIPHERALS:", cls: "white", delay: 80 },
            { text: "> CONSENT_INPUT_DEVICE..................[ DETECTED ]", delay: 90 },
            { text: "> SUB-PRIME_LOGIC_CONTROLLER............[ DETECTED ]", delay: 90 },
            { text: "> AIRWAVE_SYNTH_V1 (DORIAN MODE)........[ READY ]", cls: "purple", delay: 120 },
            { text: "", delay: 150 },
            { text: "LOADING CORE DRIVERS:", cls: "white", delay: 80 },
            { text: "> manufacturing_consent.sys.............[ LOADED ]", delay: 70 },
            { text: "> antisocial_incentives.vxd.............[ LOADED ]", delay: 70 },
            { text: "> solo_jazz_cup_palette.dll.............[ LOADED ]", delay: 70 },
            { text: "> mike_tyson_knockout_logic.bin.........[ LOADED ]", delay: 100 },
            { text: "", delay: 150 },
            { text: "NETWORK STATUS:", cls: "white", delay: 80 },
            { text: "IP: 127.0.0.6:47 (LOCAL_ENNUI)", delay: 80 },
            { text: "GATEWAY: THE_PARKING_LOT_SUNSET", delay: 80 },
            { text: "PACKET LOSS: 0% (TOTAL_CONGRUENCE_DETECTED)", delay: 200 },
            { text: "", delay: 150 },
            { text: "[ WARNING ] : OPTIMIZATION_LEVEL IS AT 0.0%", cls: "warn", delay: 200 },
            { text: "[ WARNING ] : HUMAN_AGENCY DETECTED IN OPERATOR_CHAIR", cls: "warn", delay: 300 },
            { text: "[ NOTICE  ] : THE TIME IS 6:47 PM. THE PARKING LOT IS SILENT.", cls: "dim", delay: 400 },
            { text: "", delay: 200 },
            { text: "MOUNTING DRIVE C: (THE_SHADOW_LAYER)...", delay: 120 },
            { text: "SCANNING FOR MODERATE_SENTIMENT...", delay: 100 },
        ];

        // The progress bar and final lines are handled separately
        const POST_FINAL = [
            { text: "RESULT: 42,901 NODES FLAGGED FOR RE-EDUCATION.", cls: "warn", delay: 300 },
            { text: "", delay: 150 },
            { text: "BOOT SEQUENCE COMPLETE.", cls: "header", delay: 400 },
            { text: "", delay: 200 },
            { text: 'SYSTEM_MESSAGE:', cls: "white", delay: 100 },
            { text: '"THE MACHINE REWARDS THE ARCHITECT.', cls: "quote", delay: 120 },
            { text: ' THE ARCHITECT REWARDS THE STATE.', cls: "quote", delay: 120 },
            { text: ' THE STATE IS THE ONLY FEED."', cls: "quote", delay: 500 },
            { text: "", delay: 200 },
            { text: "PRESS [ START_OS ] TO BEGIN THE TRANSITION TO 6:48 PM.", cls: "header", delay: 0 },
        ];

        const terminal = document.getElementById('bios-text');
        const cursor = document.getElementById('cursor');
        let lineIndex = 0;

        function addLine(text, cls) {
            const span = document.createElement('span');
            if (cls) span.className = cls;
            span.textContent = text + '\n';
            terminal.appendChild(span);
            // Auto-scroll
            const boot = document.getElementById('boot-screen');
            boot.scrollTop = boot.scrollHeight;
        }

        function typeProgressBar(callback) {
            const bar = document.createElement('span');
            terminal.appendChild(bar);
            let progress = 0;
            const total = 36;

            function tick() {
                if (progress <= total) {
                    bar.textContent = '[' + '#'.repeat(progress) + ' '.repeat(total - progress) + '] ' + Math.round(progress / total * 100) + '%';
                    progress++;
                    setTimeout(tick, 15 + Math.random() * 25);
                } else {
                    bar.textContent += '\n';
                    callback();
                }
            }
            tick();
        }

        function typeLines(lines, index, callback) {
            if (index >= lines.length) {
                if (callback) callback();
                return;
            }

            const line = lines[index];
            addLine(line.text, line.cls);

            // Jitter for realism
            const jitter = Math.random() * 60;
            setTimeout(() => typeLines(lines, index + 1, callback), line.delay + jitter);
        }

        function startBoot() {
            // Check WebGPU first
            if (!navigator.gpu) {
                const btn = document.getElementById('start-btn');
                const error = document.getElementById('webgpu-error');
                if (btn) btn.style.display = 'none';
                if (cursor) cursor.style.display = 'none';
                if (error) error.style.display = 'block';
                return;
            }

            // Phase 1: Main POST lines
            typeLines(POST_LINES, 0, () => {
                // Phase 2: Progress bar
                typeProgressBar(() => {
                    // Phase 3: Final lines + show button
                    typeLines(POST_FINAL, 0, () => {
                        cursor.style.display = 'none';
                        document.getElementById('start-btn').style.display = 'block';
                    });
                });
            });
        }

        // The "Start" click resumes AudioContext and hides the boot screen
        document.getElementById('start-btn').addEventListener('click', () => {
            const boot = document.getElementById('boot-screen');
            if (boot) {
                boot.classList.add('hidden');
                setTimeout(() => boot.remove(), 900);
            }
            // Dispatch event for WASM to pick up (Web Audio API user gesture)
            window.dispatchEvent(new CustomEvent('broadcast-os-ready'));
        });

        // Start the POST sequence on load
        window.addEventListener('load', startBoot);
    </script>
