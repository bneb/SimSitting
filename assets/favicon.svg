<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <style>
    @keyframes blink {
      0%, 100% { fill: #F03A3A; opacity: 1; }
      50% { fill: #F03A3A; opacity: 0.3; }
    }
    .text {
      font-family: 'Courier New', monospace;
      font-size: 160px;
      font-weight: bold;
      fill: #F4F4F5;
    }
    .rec {
      animation: blink 2s infinite;
    }
  </style>
  <rect width="256" height="256" fill="#0A0A0C" />
  <text x="44" y="196" class="text">S</text>
  <rect x="180" y="60" width="32" height="32" class="rec" />
</svg>
